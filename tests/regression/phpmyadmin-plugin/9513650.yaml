---
meta:
  author: "azurit"
  description: "PhpMyAdmin Rule Exclusions Plugin"
  rule_id: 9513650
tests:
  - test_id: 1
    desc: FP with goto parameter
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: "OWASP CRS test agent"
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
            Cookie: phpMyAdmin=1
          port: 80
          method: POST
          version: HTTP/1.1
          uri: /post/index.php?route=/sql
          data: goto=index.php%3Fdb%3Dtest%26goto%3Dindex.php
        output:
          log:
            no_expect_ids: [932380]
  - test_id: 2
    desc: |
      FP with sql_query parameter and JOIN keyword
      Decoded payload:

      SELECT link_rewrite, COUNT(*) c
      FROM ps_product_lang pl
      JOIN ps_product_shop ps ON ps.id_product = pl.id_product AND ps.id_shop = 2
      WHERE pl.id_lang = 8
      GROUP BY link_rewrite
      HAVING c > 1;
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: "OWASP CRS test agent"
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
            Cookie: phpMyAdmin=1
            Content-Type: application/x-www-form-urlencoded
          port: 80
          method: POST
          version: HTTP/1.1
          uri: /post/index.php?route=/sql
          data: sql_query=SELECT%20link_rewrite%2C%20COUNT%28%2A%29%20c%0AFROM%20ps_product_lang%20pl%0AJOIN%20ps_product_shop%20ps%20ON%20ps.id_product%20%3D%20pl.id_product%20AND%20ps.id_shop%20%3D%202%0AWHERE%20pl.id_lang%20%3D%208%0AGROUP%20BY%20link_rewrite%0AHAVING%20c%20%3E%201%3B
        output:
          log:
            no_expect_ids: [932235]
  - test_id: 3
    desc: FP with IS_NULLABLE keyword
    stages:
      - input:
          dest_addr: 127.0.0.1
          headers:
            Host: localhost
            User-Agent: "OWASP CRS test agent"
            Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9,text/plain;q=0.8,image/png,*/*;q=0.5
            Cookie: phpMyAdmin=1
            Content-Type: application/x-www-form-urlencoded
          port: 80
          method: POST
          version: HTTP/1.1
          uri: /post/index.php?route=/sql
          data: sql_query=SELECT%0A%20%20CONCAT%28%0A%20%20%20%20%27ALTER%20TABLE%20%60%27%2C%20TABLE_NAME%2C%0A%20%20%20%20%27%60%20CHANGE%20%60%27%2C%20COLUMN_NAME%2C%20%27%60%20%60%27%2C%0A%20%20%20%20REPLACE%28COLUMN_NAME%2C%20%27%3A%27%2C%20%27.%27%29%2C%20%27%60%20%27%2C%0A%20%20%20%20COLUMN_TYPE%2C%0A%20%20%20%20IF%28IS_NULLABLE%20%3D%20%27NO%27%2C%20%27%20NOT%20NULL%27%2C%20%27%27%29%2C%0A%20%20%20%20IF%28COLUMN_DEFAULT%20IS%20NOT%20NULL%2C%20CONCAT%28%27%20DEFAULT%20%27%2C%20QUOTE%28COLUMN_DEFAULT%29%29%2C%20%27%27%29%2C%0A%20%20%20%20IF%28EXTRA%20%21%3D%20%27%27%2C%20CONCAT%28%27%20%27%2C%20EXTRA%29%2C%20%27%27%29%2C%0A%20%20%20%20%27%3B%27%0A%20%20%29%20AS%20query%0AFROM%20INFORMATION_SCHEMA.COLUMNS%0AWHERE%20COLUMN_NAME%20LIKE%20%27%25%3A%25%27%0A%20%20AND%20TABLE_SCHEMA%20%3D%20%27llstdcom_dev%27%3B
